<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Děkujeme — Bezmakléři</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="canonical" href="https://www.bezmakleri.cz/dekujeme" />
  <link rel="icon" type="image/x-icon" href="favicon.ico" />
  <link rel="icon" type="image/png" sizes="512x512" href="favicon.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    .thankyou-section {
      min-height: 100vh;
      background: var(--color-bg-dark);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 6rem 1.5rem;
    }
    .thankyou-inner {
      max-width: 560px;
    }
    .thankyou-icon {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: var(--color-gold);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 2rem;
      font-size: 2rem;
    }
    .thankyou-inner h1 {
      font-size: 2.8rem;
      color: #fff;
      margin-bottom: 1rem;
    }
    .thankyou-inner p {
      color: rgba(255,255,255,0.7);
      font-size: 1.1rem;
      line-height: 1.7;
      margin-bottom: 2.5rem;
    }
    .thankyou-inner strong {
      color: var(--color-gold);
    }
  </style>
</head>
<body>

  <nav class="navbar" id="navbar">
    <div class="container navbar-inner">
      <a href="/" class="logo-link">
        <img src="assets/logo/logo.webp" alt="Bezmakléři" class="logo-img" width="80" height="59" />
        <span class="logo-main">BEZMAKLÉŘI</span>
      </a>
    </div>
  </nav>

  <section class="thankyou-section">
    <div class="thankyou-inner">
      <div class="thankyou-icon">✓</div>
      <h1>Děkujeme!</h1>
      <p>Vaše poptávka byla úspěšně odeslána.<br />
      Ozve se vám <strong>Martin do 24 hodin</strong>.</p>
      <a href="/" class="btn btn-gold btn-pill">Zpět na hlavní stránku</a>
    </div>
  </section>

</body>
</html>
